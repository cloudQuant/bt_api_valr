site_name: "VALR Documentation"
site_description: "VALR plugin for bt_api"
site_author: cloudQuant
site_url: https://bt-api-valr.readthedocs.io/

repo_name: cloudQuant/bt_api_valr
repo_url: https://github.com/cloudQuant/bt_api_valr

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - tables
